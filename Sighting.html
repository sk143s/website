<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ffe4e1, #ffccd5);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    padding: 15px;
    position: relative;
  }

  /* Big heart background */
  body::before {
    content: "❤️";
    position: fixed;
    font-size: 20rem;
    opacity: 0.07;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Glassmorphism container */
  .hero {
    text-align: center;
    padding: 25px;
    max-width: 500px;
    width: 100%;
    z-index: 1;
    position: relative;
    background: rgba(255, 255, 255, 0.25);
    border-radius: 20px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    overflow: hidden;
  }

  .hero h1 {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2.5rem, 6vw, 4rem);
    color: #d6336c;
    /* margin-bottom: 3px; */
  }

  .hero p {
    font-size: clamp(1rem, 4vw, 1.2rem);
    color: #39373b;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .imgcls {
    width: 180px;
    height: 180px;
    object-fit: contain;
    margin-top:10px;
    /* margin-bottom: 15px; */
  }

  /* Buttons */
  .hero button {
    background: linear-gradient(135deg, #ff4d6d, #ff758f);
    border: none;
    font-size: 1rem;
    color: white;
    border-radius: 30px;
    cursor: pointer;
    display: block;
    margin: 12px auto;
    width: 220px;
    height: 50px;
    font-weight: bold;
    box-shadow: 0 4px 12px rgba(255, 77, 109, 0.4);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }

  /* Heart splash */
  .heart {
    position: fixed;
    font-size: 1.5rem;
    animation: burst 1s ease-out forwards;
    pointer-events: none;
    z-index: 99999;
  }

  @keyframes burst {
    0% {
      transform: translate(0, 0) scale(1);
      opacity: 1;
    }
    100% {
      transform: translate(var(--x), var(--y)) scale(0.5);
      opacity: 0;
    }
  }

  /* Mobile-friendly */
  @media (max-height: 600px) {
    body {
      align-items: flex-start;
    }
    .hero {
      margin-top: 20px;
    }
  }
</style>
</head>
<body>

  <div class="hero">

    <p></p>
    <button onclick="location.href='Spark.html'">Continue 💘</button>
    <button onclick="location.href='About me.html'">Back 💖</button>
  </div>

<script>
  // Heart splash effect
  document.addEventListener("click", function(e) {
    for (let i = 0; i < 8; i++) {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.textContent = ["💖","💘","💝","❤️","💕"][Math.floor(Math.random()*5)];
      document.body.appendChild(heart);

      const angle = Math.random() * 2 * Math.PI;
      const distance = Math.random() * 100 + 40;
      const x = Math.cos(angle) * distance + "px";
      const y = Math.sin(angle) * distance + "px";

      heart.style.left = e.clientX + "px";
      heart.style.top = e.clientY + "px";
      heart.style.setProperty("--x", x);
      heart.style.setProperty("--y", y);

      setTimeout(() => heart.remove(), 1000);
    }
  });
</script>

</body>
</html>
